services:
  - type: worker
    name: discord-tags-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    numInstances: 1
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/data/discord_tags.db
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1